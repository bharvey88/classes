site_name: Smart Homes Done the Right Way
site_description: A beginner-friendly Introduction to Home Assistant class, free and ready to fork.
site_url: https://bharvey88.github.io/home-assistant-intro-class/

repo_url: https://github.com/bharvey88/home-assistant-intro-class
repo_name: bharvey88/home-assistant-intro-class
edit_uri: edit/main/docs/

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.top
    - navigation.footer
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow

nav:
  - Home: index.md
  - Class Outline: outline.md
  - Attendee Handout: handout.md

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
