name: Build class materials

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc + LibreOffice
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pandoc libreoffice-writer

      - name: Build docx + pdf
        run: |
          mkdir -p dist
          build() {
            local src="$1" out="$2"
            pandoc "$src" -o "dist/$out.docx"
            soffice --headless --convert-to pdf --outdir dist "dist/$out.docx"
          }
          build docs/outline.md "Speaker-Cue-Outline"
          build docs/handout.md "HA-Attendee-Handout"
          ls -la dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: class-materials
          path: dist/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
